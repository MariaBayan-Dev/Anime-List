<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista animes más populares</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!----HEADER LISTA---->
    <header>
        <div class="header-container">
            <img src="./img/logoipsum-350.png" alt="Logo tipo placeholder">
            <div class="title-container">
                <h1>AnimeJin</h1>
                <p>¡Tu lugar de información anime!</p>
            </div>
        </div>
    </header>

    <!----MAIN LISTA ANIMES---->
    <main>
        <section class="section-container">
            <ul id="list-anime">
                <li class="anime-card">
                    <img src="https://picsum.photos/200" alt="Anime alt prueba">
                    <h2>Nombre del anime</h2>
                    <span>Acción, Aventura</span>
                </li>
            </ul>
        </section>
    </main>

    <!-----JAVASCRIPT----->
    <script src="main"></script>
</body>
</html>
